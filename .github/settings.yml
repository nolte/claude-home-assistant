---
# These settings are synced to GitHub by https://probot.github.io/apps/settings/.
#
# The Probot Settings App reacts to push events that touch THIS file; changes
# to the upstream `_extends:` source (`commons-settings.yml` in
# nolte/gh-plumbing) do not trigger a fresh sync on their own. When a commons
# change should propagate (new label, changed default, …), edit this file as
# well — a one-line comment touch is enough — so the App re-runs the merge.

_extends: nolte/gh-plumbing:.github/commons-settings.yml

repository:
  name: claude-home-assistant
  description: Claude Code skills and agents for Home Assistant development — custom integrations, Lovelace cards, blueprints / automations, and ESPHome / add-on work.
  homepage: https://nolte.github.io/claude-home-assistant
  default_branch: develop
  topics:
    - claude-code
    - claude-code-plugin
    - skills
    - agents
    - home-assistant
    - custom-components
    - lovelace
    - esphome
  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: false

branches:
  - name: develop
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 0
        dismiss_stale_reviews: false
        require_code_owner_reviews: false
      required_status_checks:
        strict: true
        contexts:
          - lint
          - test
          - docs
      enforce_admins: true
      restrictions: null
  - name: main
    protection:
      required_pull_request_reviews: null
      required_status_checks: null
      enforce_admins: true
      required_linear_history: true
      restrictions: null
