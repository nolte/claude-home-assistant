site_name: claude-home-assistant
site_url: https://nolte.github.io/claude-home-assistant
site_description: Claude Code skills, agents and conventions for Home Assistant development — packaged as the claude-home-assistant plugin.
site_author: nolte

repo_url: https://github.com/nolte/claude-home-assistant
repo_name: nolte/claude-home-assistant
edit_uri: edit/develop/docs/

copyright: Copyright &copy; 2026 nolte

docs_dir: docs

theme:
  name: material
  language: de

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Zum Dunkelmodus wechseln
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Zum Hellmodus wechseln

  font:
    text: Roboto
    code: Roboto Mono

  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - header.autohide
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit

plugins:
  - search:
      lang:
        - de
        - en
      separator: '[\s\-,:!=\[\]()\"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'

  - i18n:
      docs_structure: folder
      fallback_to_default: true
      languages:
        - locale: de
          name: Deutsch
          default: true
          build: true
        - locale: en
          name: English
          build: true

  - literate-nav:
      nav_file: SUMMARY.md

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

hooks:
  # Regenerate the skill/agent catalog into docs/de/ in on_pre_build, before
  # MkDocs collects files, so mkdocs-static-i18n localizes real docs_dir files
  # (gen-files virtual pages are dropped by i18n — ultrabug/mkdocs-static-i18n#263).
  - scripts/docs/gen_catalog.py

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/nolte/claude-home-assistant

nav:
  - Startseite: index.md
  - Skills: skills/SUMMARY.md
  - Agents: agents/SUMMARY.md
  - Tags: tags.md
