# https://taskfile.dev

version: '3'

vars:
  TASK_COLLECTION_BASE: https://raw.githubusercontent.com/nolte/taskfiles/develop/src

includes:
  mkdocs: "{{.TASK_COLLECTION_BASE}}/taskfile-include-mkdocs.yaml"
  pre-commit: "{{.TASK_COLLECTION_BASE}}/taskfile-include-pre-commit.yaml"

tasks:
  default:
    cmds:
      - task -l
    silent: true

  lint:
    desc: Run pre-commit across all files
    cmds:
      - pre-commit run --all-files

  test:
    desc: Run the test suite (placeholder — no runtime tests yet)
    cmds:
      - echo "no tests yet"
    silent: true

  docs:
    desc: Build the MkDocs site
    cmds:
      - mkdocs build --strict

  plugin:reload:
    desc: Start Claude Code with this repo loaded as a plugin (dogfooding)
    cmds:
      - claude --plugin-dir .

  worktree:root:
    desc: |
      Print the resolved worktree root for this machine. Reads
      NOLTE_WORKTREE_ROOT (the per-machine, freely chosen path) and falls
      back to ~/repos/.worktrees. See spec/project/parallel-working-copies/.
    silent: true
    cmds:
      - 'echo "${NOLTE_WORKTREE_ROOT:-$HOME/repos/.worktrees}"'

  worktree:add:
    desc: |
      Create a parallel working copy under the configurable worktree root,
      always in the same predictable place: ${NOLTE_WORKTREE_ROOT:-~/repos/.worktrees}/<repo>/<slug>/.
      The branch is created off origin/develop with an explicit base ref, and a
      .resume/<slug>/plan.md plan-before-work stub is seeded inside the worktree.
      Usage: task worktree:add -- <branch> [slug]
        task worktree:add -- feat/parser-fix
        task worktree:add -- chore/ci-tidy ci
    cmds:
      - ./scripts/worktree_add.sh {{.CLI_ARGS}}

  resume:
    desc: |
      List resumable Claude Code sessions for THIS working copy (newest first,
      with their opening prompt) and print the exact `claude --resume` command.
      Use after a notebook crash, terminal close, or session expiry to get back
      to an interrupted run — covers all top-level work, including free-form work
      no resumable skill governs.
    cmds:
      - python3 scripts/resume_sessions.py
    silent: true
